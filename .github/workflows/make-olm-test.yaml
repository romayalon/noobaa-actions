name: Run make OLM Test

on: [push, pull_request, workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-make-olm-test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: romayalon/noobaa-operator
          ref: romy-setuptool-81

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
          cache-dependency-path: |
            **/go.sum
      - name: Set environment variables
        run: |
          echo "PATH=$PATH:$HOME/go/bin" >> $GITHUB_ENV
          echo "OPERATOR_IMAGE=noobaa/noobaa-operator:integration" >> $GITHUB_ENV

      - name: Setup Minikube
        uses: medyagh/setup-minikube@v0.0.19
        with:
          driver: docker
          kubernetes-version: v1.33.0

      - name: Verify Minikube is running
        run: minikube status

      - name: Install Tools
        run: |
          bash ./.travis/install-tools.sh
          bash ./.travis/install-python.sh

      - name: Make OLM
        run: |
          set -x
          make gen-olm

name: openssl check
on: 
  workflow_dispatch:

jobs:
  manual-nc-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: romayalon/noobaa-core     

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
        
      - name: check ssl version
        run: |
          sudo apt-get update --fix-missing
          sudo apt-get -y install nasm libcap-dev
          node -e "console.log('Node', process.version, 'OpenSSL', process.versions.openssl)"

